{% extends "base.html" %}
{% block title %}Log in — Expenser{% endblock %}

{% block content %}
<div class="flex min-h-full flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="text-center text-3xl font-bold tracking-tight text-gray-900">Sign in to Expenser</h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      Or <a href="{% url 'register' %}" class="text-indigo-600 hover:text-indigo-500">create a new account</a>
    </p>
  </div>
  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-6 shadow rounded-lg sm:px-10">
      <form method="post" class="space-y-6">
        {% csrf_token %}
        {% for field in form %}
        <div>
          <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700">{{ field.label }}</label>
          <div class="mt-1">{{ field }}</div>
          {% if field.errors %}<p class="mt-1 text-sm text-red-600">{{ field.errors|join:", " }}</p>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700">
          Sign in
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
