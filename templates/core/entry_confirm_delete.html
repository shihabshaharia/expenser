{% extends "base.html" %}
{% block title %}Delete Entry — Expenser{% endblock %}

{% block content %}

<!-- Delete confirmation (design.md §5.9) -->
<div class="max-w-md">
  <h1 class="text-2xl font-bold text-gray-900 mb-2">Delete entry?</h1>
  <p class="text-sm text-gray-500 mb-6">
    This will permanently delete
    <strong class="text-gray-900">{{ object }}</strong>.
    This action cannot be undone.
  </p>

  <div class="bg-white border border-gray-200 rounded-xl p-6">
    <form method="post" class="flex items-center gap-3">
      {% csrf_token %}
      <button type="submit"
              class="bg-red-600 text-white hover:bg-red-700 rounded-lg px-5 py-2 text-sm font-medium transition-colors">
        Yes, delete
      </button>
      <a href="{% url 'entry_list' %}"
         class="text-sm text-gray-500 hover:text-gray-900 px-4 py-2">
        Cancel
      </a>
    </form>
  </div>
</div>

{% endblock %}
